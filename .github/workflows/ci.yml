name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags:
      - "**"

permissions:
  contents: read

jobs:
  test:
    name: Core suites - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
          - "pre"
        os:
          - ubuntu-latest
          - macos-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Resolve and load harness package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(); using JuliaLangProjectHarness'
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'

  strict_self_apply:
    name: Strict self-apply profile - Julia 1.12 - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-self-apply-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-self-apply-${{ env.cache-name }}-
            ${{ runner.os }}-self-apply-
            ${{ runner.os }}-
      - name: Resolve and load harness package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(); using JuliaLangProjectHarness'
      - name: Run strict self-apply profile gate
        env:
          JULIA_NUM_THREADS: "2"
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using JuliaLangProjectHarness; assert_julia_project_harness_test_profile_clean(pwd(); advice_io=stderr); println("self-profile-ok")'
